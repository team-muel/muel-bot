# Supabase CLI config for muel-bot.
#
# This file lets `supabase functions deploy ...` and `supabase db push`
# operate against the Muel project. It does not store secrets.
#
# Project link: run once per machine
#   supabase link --project-ref <ref>
# (project ref is in the dashboard URL: dashboard/project/<ref>)

project_id = "muel-bot"

[api]
enabled = true
# Schemas exposed via PostgREST (Data API). The mafia schema stays exposed for
# read-only client queries; write authority is enforced by RLS + Edge Functions.
schemas = ["public", "mafia"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = false

[auth]
enabled = true
site_url = "https://muel-tree.vercel.app"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:3015"]
jwt_expiry = 3600
enable_signup = true

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[functions]
# Verify JWT for every function unless explicitly overridden per-function.
# We override health/ to false (health checks should not require auth).

[functions.health]
verify_jwt = false

[functions.auth-exchange]
verify_jwt = false

[functions.match-create]
verify_jwt = false

[functions.match-resolve]
verify_jwt = false

[functions.match-join]
verify_jwt = false

[functions.match-ready]
verify_jwt = false

[functions.match-start]
verify_jwt = false

[functions.match-select-role]
verify_jwt = false

[functions.match-action]
verify_jwt = false

[functions.match-chat]
verify_jwt = false

[functions.phase-advance]
# Called by pg_cron through net.http_post without a Discord user JWT.
verify_jwt = false

[functions.match-kick]
verify_jwt = false

[functions.match-leave]
verify_jwt = false

[realtime]
enabled = true
