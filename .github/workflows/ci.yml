name: CI

on:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'supabase/migrations/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
      - master

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck

  smoke:
    name: smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Smoke tests (no live API keys required)
        env:
          DISCORD_BOT_TOKEN: smoke-test-dummy
        run: npm run test:smoke
