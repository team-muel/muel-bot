services:
  - type: web
    name: muel-bot
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: MUEL_AI_MODEL
        value: gemini-2.5-flash
      - key: HUB_URL
        value: https://muel-tree.vercel.app
      - key: GOMDORI_BOT_TOKEN
        sync: false
