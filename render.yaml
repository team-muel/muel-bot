services:
  - type: web
    name: muel-bot
    runtime: node
    # Production target: keep the Discord gateway always-on.
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_APPLICATION_PUBLIC_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GOOGLE_GENERATIVE_AI_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: MUEL_AI_MODEL
        value: gemini-2.5-flash
      - key: MUEL_CHAT_MODEL
        value: gemini-2.5-flash
      - key: MUEL_ROUTER_MODEL
        value: gemini-2.5-flash
      - key: MUEL_EXTRACT_MODEL
        value: gemini-3.5-flash
      - key: MUEL_SUMMARY_MODEL
        value: gemini-2.5-flash
      - key: MUEL_HEAVY_MODEL
        value: gemini-3.5-flash
      - key: MUEL_EMBEDDING_MODEL
        value: gemini-embedding-001
      - key: MUEL_EMBEDDING_DIMENSIONS
        value: "768"
      - key: HUB_URL
        value: https://muel-tree.vercel.app
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.3-70b-instruct
      - key: GOMDORI_BOT_TOKEN
        sync: false
      - key: GOMDORI_APPLICATION_PUBLIC_KEY
        sync: false
      - key: ENABLE_JOB_WORKER
        value: "true"
      - key: ENABLE_YOUTUBE_MONITOR
        value: "true"
      - key: ENABLE_HTTP_INTERACTIONS
        value: "false"
      - key: MENTION_REPLY_TIMEOUT_MS
        value: "15000"
      - key: AIQ_POLL_TIMEOUT_MS
        value: "2700000"
